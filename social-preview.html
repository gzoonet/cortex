<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1280px;
  height: 640px;
  overflow: hidden;
  background: #0a0e17;
  font-family: 'Outfit', sans-serif;
  position: relative;
}

/* Subtle grid */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(99, 179, 237, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99, 179, 237, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Constellation nodes */
.node {
  position: absolute;
  border-radius: 50%;
  background: rgba(99, 179, 237, 0.6);
  box-shadow: 0 0 12px rgba(99, 179, 237, 0.3);
}
.node.dim { background: rgba(99, 179, 237, 0.2); box-shadow: none; }
.node.bright { background: rgba(139, 233, 253, 0.8); box-shadow: 0 0 20px rgba(139, 233, 253, 0.4); }
.node.accent { background: rgba(80, 250, 123, 0.7); box-shadow: 0 0 16px rgba(80, 250, 123, 0.3); }

/* Constellation edges */
.edge {
  position: absolute;
  background: linear-gradient(90deg, rgba(99, 179, 237, 0.15), rgba(99, 179, 237, 0.05));
  height: 1px;
  transform-origin: left center;
}

/* Content */
.content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 100px;
  height: 100%;
}

.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(80, 250, 123, 0.9);
  border: 1px solid rgba(80, 250, 123, 0.25);
  padding: 6px 14px;
  border-radius: 4px;
  margin-bottom: 28px;
  background: rgba(80, 250, 123, 0.05);
  width: fit-content;
}

h1 {
  font-size: 86px;
  font-weight: 900;
  color: #f8fafc;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 20px;
}

h1 span {
  background: linear-gradient(135deg, #63b3ed, #8be9fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  font-size: 26px;
  font-weight: 300;
  color: rgba(248, 250, 252, 0.55);
  letter-spacing: 0.5px;
}

.tech {
  position: absolute;
  bottom: 40px;
  left: 100px;
  display: flex;
  gap: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: rgba(248, 250, 252, 0.25);
}

.tech span {
  padding: 4px 10px;
  border: 1px solid rgba(248, 250, 252, 0.08);
  border-radius: 3px;
}

/* GZOO mark */
.gzoo {
  position: absolute;
  bottom: 38px;
  right: 80px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: rgba(248, 250, 252, 0.2);
  letter-spacing: 3px;
}

/* Glow */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99, 179, 237, 0.08) 0%, transparent 70%);
  top: -100px;
  right: 50px;
}
.glow2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(80, 250, 123, 0.05) 0%, transparent 70%);
  bottom: -50px;
  left: 200px;
}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <!-- Constellation nodes - right side -->
  <div class="node bright" style="width:8px;height:8px;top:120px;right:280px"></div>
  <div class="node" style="width:6px;height:6px;top:180px;right:200px"></div>
  <div class="node dim" style="width:4px;height:4px;top:90px;right:180px"></div>
  <div class="node accent" style="width:7px;height:7px;top:220px;right:320px"></div>
  <div class="node" style="width:5px;height:5px;top:160px;right:380px"></div>
  <div class="node dim" style="width:3px;height:3px;top:280px;right:240px"></div>
  <div class="node bright" style="width:6px;height:6px;top:300px;right:340px"></div>
  <div class="node" style="width:5px;height:5px;top:340px;right:180px"></div>
  <div class="node dim" style="width:4px;height:4px;top:250px;right:140px"></div>
  <div class="node accent" style="width:5px;height:5px;top:380px;right:280px"></div>
  <div class="node dim" style="width:3px;height:3px;top:400px;right:160px"></div>
  <div class="node" style="width:4px;height:4px;top:150px;right:100px"></div>
  <div class="node bright" style="width:5px;height:5px;top:420px;right:380px"></div>
  <div class="node dim" style="width:3px;height:3px;top:480px;right:220px"></div>
  <div class="node" style="width:4px;height:4px;top:500px;right:320px"></div>

  <!-- Edges -->
  <div class="edge" style="width:120px;top:123px;right:196px;transform:rotate(-25deg)"></div>
  <div class="edge" style="width:90px;top:183px;right:282px;transform:rotate(15deg)"></div>
  <div class="edge" style="width:140px;top:225px;right:178px;transform:rotate(-30deg)"></div>
  <div class="edge" style="width:100px;top:303px;right:238px;transform:rotate(20deg)"></div>
  <div class="edge" style="width:110px;top:345px;right:278px;transform:rotate(-10deg)"></div>
  <div class="edge" style="width:80px;top:383px;right:160px;transform:rotate(35deg)"></div>
  <div class="edge" style="width:130px;top:425px;right:248px;transform:rotate(-15deg)"></div>

  <div class="content">
    <div class="badge">v0.1.0 &middot; Open Source</div>
    <h1>GZOO <span>Cortex</span></h1>
    <p class="tagline">Local-first knowledge graph for developers</p>
  </div>

  <div class="tech">
    <span>TypeScript</span>
    <span>SQLite</span>
    <span>LanceDB</span>
    <span>Ollama</span>
    <span>React</span>
    <span>D3</span>
  </div>

  <div class="gzoo">GZOO</div>
</body>
</html>
